<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background for visibility -->
  <rect width="200" height="200" rx="40" ry="40" fill="url(#bg)"/>
  <!-- Bold stylized R letterform -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical stem of R - thick and bold -->
    <path d="M68 45 L68 155" stroke="#e6edf3" stroke-width="14"/>
    <!-- Bowl of R - upper curve -->
    <path d="M68 45 L105 45 C 145 45, 148 95, 108 100 L68 100" stroke="#e6edf3" stroke-width="14" fill="none"/>
    <!-- Leg of R - diagonal kick -->
    <path d="M100 100 L140 155" stroke="#58a6ff" stroke-width="14"/>
    <!-- Accent dot -->
    <circle cx="148" cy="48" r="6" fill="#58a6ff"/>
  </g>
</svg>